<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频创造神话</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // SPA redirect recovery for GitHub Pages
    (function() {
      var params = new URLSearchParams(window.location.search);
      var path = params.get('path');
      if (path) {
        window.history.replaceState(null, '', '/ai-vido-web/' + path);
      }
    })();
  </script>
  <script>
    // 主动卸载所有旧 Service Worker（一次性清理）
    //
    // 背景：本项目已按设计约束移除 Service Worker（不再保留 public/sw.js，
    // 也不再注册新 SW）。但老用户浏览器里可能仍残留旧版 SW（cache-first +
    // 跨域媒体拦截），会破坏 <img>/<audio>/<video> 的原生渲染，导致预览异常。
    //
    // 本脚本在页面加载时检测并卸载全部已注册 SW，清空后 reload 一次。
    // 清理完成后 regs.length===0，不再触发 reload，不会形成循环。
    // 此后应用保持纯在线模式，所有资源走浏览器默认 HTTP 缓存。
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length > 0) {
            Promise.all(regs.map(function(r) { return r.unregister(); }))
              .then(function() {
                window.location.reload();
              });
          }
        }).catch(function() { /* ignore */ });
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
