<head>

  <title>视频创造神话</title>

<body>
  <div id="root"></div>
  <script>
    // SPA redirect recovery for GitHub Pages
    (function() {
      var params = new URLSearchParams(window.location.search);
      var path = params.get('path');
      if (path) {
        window.history.replaceState(null, '', '/ai-vido-web/' + path);
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
