<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Single-page app redirect for GitHub Pages
    // When a direct URL like /ai-vido-web/workbench is accessed,
    // GitHub Pages returns 404.html instead. We redirect to the SPA root
    // with the path encoded in the query string.
    var path = window.location.pathname.slice(window.location.pathname.indexOf('/ai-vido-web/') + '/ai-vido-web/'.length);
    window.location.replace('/ai-vido-web/?path=' + encodeURIComponent(path));
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
